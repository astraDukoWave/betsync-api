version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-betsync}
      POSTGRES_USER: ${POSTGRES_USER:-betsync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-betsync_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-betsync}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
    command: >-
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-betsync}:${POSTGRES_PASSWORD:-betsync_pass}@postgres:5432/${POSTGRES_DB:-betsync}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-betsync}:${POSTGRES_PASSWORD:-betsync_pass}@postgres:5432/${POSTGRES_DB:-betsync}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ODDS_API_KEY: ${ODDS_API_KEY:-your_odds_api_key_here}
      SECRET_KEY: ${SECRET_KEY:-changeme_in_production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build:
      context: .
      target: worker
    command: celery -A app.worker.celery_app worker --loglevel=info -Q pipeline
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-betsync}:${POSTGRES_PASSWORD:-betsync_pass}@postgres:5432/${POSTGRES_DB:-betsync}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-betsync}:${POSTGRES_PASSWORD:-betsync_pass}@postgres:5432/${POSTGRES_DB:-betsync}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ODDS_API_KEY: ${ODDS_API_KEY:-your_odds_api_key_here}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
